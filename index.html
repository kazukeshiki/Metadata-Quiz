<!DOCTYPE html>
<html>
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<title>Metadata Quiz</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
radial-gradient(circle at center,rgba(56,189,248,.25),transparent 45%),
linear-gradient(180deg,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#container{
width:760px;
text-align:center;
}

/* TAP SCREEN */

#tapScreen{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
cursor:pointer;
}

.tapText{
font-size:34px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

/* INTRO */

#introScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#1e293b;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

.introLogo{
height:90px;
margin:15px;
opacity:0;
transform:scale(.6);
animation:logoReveal 1.4s ease forwards;
filter:drop-shadow(0 0 20px rgba(96,165,250,.6));
}

.introLogo:nth-child(2){
animation-delay:.9s;
}

@keyframes logoReveal{
0%{opacity:0;transform:scale(.6);}
70%{opacity:1;transform:scale(1.05);}
100%{opacity:1;transform:scale(1);}
}

.introText{
font-size:28px;
margin-top:10px;
opacity:0;
animation:fadeIn 1.2s forwards;
animation-delay:1.8s;
}

@keyframes fadeIn{
to{opacity:1}
}

/* LANDING */

#landing{
display:none;
}

#landingLogos{
display:flex;
justify-content:center;
gap:40px;
margin-bottom:25px;
}

.landingLogo{
height:60px;
filter:drop-shadow(0 0 10px rgba(96,165,250,.5));
}

.startBtn{
padding:16px 34px;
font-size:20px;
background:#22c55e;
border:none;
border-radius:12px;
cursor:pointer;
box-shadow:0 0 20px rgba(34,197,94,.4);
}

/* CARD */

.card{
background:#1e293b;
border-radius:16px;
padding:35px;
box-shadow:0 0 30px rgba(59,130,246,.5);
}

/* TIMER */

.timer-wrapper{
position:relative;
width:90px;
height:90px;
margin:0 auto 25px auto;
display:flex;
justify-content:center;
align-items:center;
}

.timer-svg{
width:90px;
height:90px;
position:absolute;
top:0;
left:0;
transform:rotate(-90deg);
}

.timer-bg{
fill:none;
stroke:#1e293b;
stroke-width:7;
}

.timer-progress{
fill:none;
stroke:#22c55e;
stroke-width:7;
stroke-linecap:round;
filter:drop-shadow(0 0 6px rgba(34,197,94,.7));
}

#timerText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:26px;
font-weight:bold;
}

/* ANSWERS */

.answerBtn{
display:block;
width:100%;
padding:14px;
margin:12px 0;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
cursor:pointer;
font-size:17px;
}

.answerBtn:hover{
background:#334155;
}

.correctAnswer{
background:#16a34a !important;
}

.wrongAnswer{
background:#dc2626 !important;
}

/* RESULT */

#result{
font-size:42px;
margin-bottom:10px;
}

.correct{color:#22c55e;}
.incorrect{color:#ef4444;}

.resultButtons{
margin-top:30px;
display:flex;
justify-content:center;
gap:20px;
}

.gameBtn{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.homeBtn{background:#3b82f6;}

.hidden{display:none;}

@keyframes panicPulse{
0%{background:#0f172a;}
50%{background:#1f2937;}
100%{background:#0f172a;}
}

.panicMode{
animation:panicPulse .6s infinite;
}

</style>
</head>

<body>

<div id="tapScreen" onclick="startExperience()">
<div class="tapText">Tap Screen to Begin Experience</div>
</div>

<div id="container">

<div id="introScreen">

<img src="edms.png" class="introLogo">
<img src="mfiles.png" class="introLogo">
<h2 class="introText">Metadata Quiz Challenge</h2>

</div>

<div id="landing">

<div id="landingLogos">
<img src="edms.png" class="landingLogo">
<img src="mfiles.png" class="landingLogo">
</div>

<h1>Metadata Quiz</h1>
<button class="startBtn" onclick="startGame()">Start Quiz</button>

</div>

<div id="quiz" class="hidden">

<div class="card">

<div class="timer-wrapper">

<svg class="timer-svg" viewBox="0 0 100 100">

<circle class="timer-bg" cx="50" cy="50" r="40"></circle>

<circle class="timer-progress"
cx="50" cy="50" r="40"
stroke-dasharray="251"
stroke-dashoffset="0">
</circle>

</svg>

<div id="timerText">15</div>

</div>

<h2 id="question"></h2>
<div id="answers"></div>

</div>

</div>

<div id="resultScreen" class="hidden">

<div class="card">

<div id="result"></div>
<div id="explanation"></div>

<div class="resultButtons">
<button id="homeBtn" class="gameBtn homeBtn" onclick="goHome()">
Return to Main Page
</button>
</div>

</div>
</div>

<audio id="bgm" src="quiz_music.mp3" loop></audio>
<audio id="clap" src="clap.mp3"></audio>
<audio id="fail" src="fail.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let bgm=document.getElementById("bgm");

const TOTAL_TIME=15;
const circumference=251;

let startTime;
let current;
let correctIndex;
let timerActive=false;

const questions = [

{
question:"What is metadata in the simplest way to explain it?",
answers:["Corrupted data","Extra information about a file","A computer virus","A folder name"],
correct:1,
explanation:"Metadata means information about a file such as who created it, when it was created, or when it was last edited."
},

{
question:"When you take a photo using your phone, besides the photo itself, your phone also saves:",
answers:["The price of your phone","The location and time the photo was taken","The color of your clothes","Your WiFi password"],
correct:1,
explanation:"Phones automatically record details like date, time and sometimes GPS location when photos are taken."
},

{
question:"In an email, which of the following is metadata?",
answers:["The message content","An attached image","The date and time the email was sent","Emojis in the email"],
correct:2,
explanation:"Metadata describes the email such as sender, receiver and time sent."
},

{
question:"Why is metadata useful?",
answers:["It makes files look nicer","It helps us find files more easily","It makes computers run faster","It improves internet speed"],
correct:1,
explanation:"Metadata allows searching and organizing files quickly."
},

{
question:"In a Word document, metadata can include:",
answers:["Author name","Date created","Last edited date","All of the above"],
correct:3,
explanation:"Documents store details like author and timestamps as metadata."
},

{
question:"True or False: Metadata is usually recorded automatically by the system.",
answers:["True","False"],
correct:0,
explanation:"Most metadata is generated automatically by systems and applications."
},

{
question:"If we want to know who last edited a file, we check:",
answers:["File size","Font color","Metadata","Desktop background"],
correct:2,
explanation:"Metadata records actions taken on files including edits."
},

{
question:"True or False: Metadata can help us understand information about a file without opening it.",
answers:["True","False"],
correct:0,
explanation:"File properties like size and author can be viewed without opening the file."
},

{
question:"Metadata is important in digital investigations because it can show:",
answers:["Timeline of events","Who made changes","When the file was created","All of the above"],
correct:3,
explanation:"Metadata helps investigators reconstruct events and verify authenticity."
},

{
question:"Metadata exists in:",
answers:["Photos","Emails","Documents","All types of digital files"],
correct:3,
explanation:"Almost all digital files contain metadata."
},

{
question:"If you rename a file, does the original creation date change?",
answers:["Yes","No"],
correct:1,
explanation:"Renaming a file does not change the original creation date."
},

{
question:"Which of the following is NOT metadata?",
answers:["File size","Date created","Actual text inside the document","Author name"],
correct:2,
explanation:"The content is data. Metadata only describes the file."
},

{
question:"If someone edits a document, what usually changes in metadata?",
answers:["File icon","Last modified date","Folder name","Desktop wallpaper"],
correct:1,
explanation:"The system automatically updates the modified timestamp."
},

{
question:"True or False: Deleting a file always removes all its metadata permanently.",
answers:["True","False"],
correct:1,
explanation:"Metadata traces may still exist and sometimes be recoverable."
},

{
question:"Which device automatically creates metadata?",
answers:["Smartphones","Laptops","Digital cameras","All of the above"],
correct:3,
explanation:"Most digital devices automatically generate metadata."
},

{
question:"Why might investigators check metadata in a document?",
answers:["Confirm creation date","Verify editor","Establish timeline","All of the above"],
correct:3,
explanation:"Metadata helps reconstruct events and verify authenticity."
},

{
question:"If a photo shows one date but metadata shows another date, what does it suggest?",
answers:["Nothing unusual","Possible editing or manipulation","Low battery","Camera dirty"],
correct:1,
explanation:"Mismatch may indicate the file was modified."
},

{
question:"Metadata can help organizations with:",
answers:["Compliance","Audits","Record management","All of the above"],
correct:3,
explanation:"Metadata supports governance and records management."
},

{
question:"True or False: Metadata can sometimes be hidden from normal users.",
answers:["True","False"],
correct:0,
explanation:"Some metadata fields require special tools to view."
},

{
question:"If someone tries to hide digital activity, what might still reveal clues?",
answers:["File name","Folder color","Metadata","Screen brightness"],
correct:2,
explanation:"Metadata often keeps traces of actions taken on files."
}

];

let available=[...questions];

function startExperience(){

document.getElementById("tapScreen").style.display="none";

bgm.volume=.45;
bgm.play();

showIntro();

}

function showIntro(){

let intro=document.getElementById("introScreen");
let landing=document.getElementById("landing");

intro.style.display="flex";

setTimeout(()=>{
intro.style.display="none";
landing.style.display="block";
},2000);

}

function startGame(){

bgm.volume=.18;

document.getElementById("landing").style.display="none";
document.getElementById("quiz").classList.remove("hidden");

loadQuestion();

}

function loadQuestion(){

if(available.length===0) available=[...questions];

let i=Math.floor(Math.random()*available.length);
current=available.splice(i,1)[0];

let answers=[...current.answers];
correctIndex=current.correct;

document.getElementById("question").innerText=current.question;

let div=document.getElementById("answers");
div.innerHTML="";

answers.forEach((a,i)=>{

let btn=document.createElement("button");
btn.innerText=a;
btn.className="answerBtn";
btn.onclick=()=>selectAnswer(i,btn);

div.appendChild(btn);

});

startTimer();

}

function startTimer(){

startTime=Date.now();
timerActive=true;

requestAnimationFrame(updateTimer);

}

function updateTimer(){

if(!timerActive) return;

let elapsed=(Date.now()-startTime)/1000;
let remaining=Math.max(0,TOTAL_TIME-elapsed);

let seconds=Math.ceil(remaining);

document.getElementById("timerText").innerText=seconds;

let offset=circumference-(remaining/TOTAL_TIME)*circumference;

document.querySelector(".timer-progress").style.strokeDashoffset=offset;

if(seconds<=5){

document.body.classList.add("panicMode");
document.querySelector(".timer-progress").style.stroke="#ef4444";

}else{

document.body.classList.remove("panicMode");
document.querySelector(".timer-progress").style.stroke="#22c55e";

}

if(remaining<=0){

timerActive=false;
document.body.classList.remove("panicMode");
showResult(false);

}else{

requestAnimationFrame(updateTimer);

}

}

function selectAnswer(i,btn){

timerActive=false;

let buttons=document.querySelectorAll(".answerBtn");

buttons.forEach((b,index)=>{
if(index===correctIndex){
b.classList.add("correctAnswer");
}
});

if(i!==correctIndex){
btn.classList.add("wrongAnswer");
}

setTimeout(()=>{
showResult(i===correctIndex);
},700);

}

function showResult(correct){

timerActive=false;
document.body.classList.remove("panicMode");

document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultScreen").classList.remove("hidden");

let homeBtn=document.getElementById("homeBtn");
let r=document.getElementById("result");

if(correct){

homeBtn.style.display="none";

r.innerText="🎉 METADATA MASTER!";
r.className="correct";

document.getElementById("clap").play();

confetti({particleCount:250,spread:120});

setTimeout(()=>{
window.location.href="qr.html";
},7000);

}else{

homeBtn.style.display="inline-block";

r.innerText="❌ TRY AGAIN!";
r.className="incorrect";

document.getElementById("fail").play();

setTimeout(()=>{
goHome();
},5000);

}

document.getElementById("explanation").innerText=current.explanation;

}

function goHome(){

document.getElementById("resultScreen").classList.add("hidden");
document.getElementById("quiz").classList.add("hidden");

bgm.currentTime=0;
bgm.play();

showIntro();

available=[...questions];

}

</script>

</body>
</html>
